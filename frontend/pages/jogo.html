<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/jogo.css">
    <link rel="icon" type="image/x-icon" href="../assets/images/icon/memora-favicon.ico">
    <title>Memora</title>
</head>
<body>
    <section class="header">
        <img src="../assets/images/logo.svg" alt="Logo do Memora" id="logo">
        <div class="perfil-usu">
            <button id="perfil-btn">
                <img src="../assets/images/icon/circle-user-round.svg" alt="Perfil do usuário" id="perfil">
            </button>
            <div class="menu-dropdown">
                <ul>
                    <li><a href="#">Ranking</a></li>
                    <li><a href="#">Sair</a></li>
                </ul>
            </div>
        </div>
    </section>

    <section class="area-jogo">
        <div class="tema-selector">
            <button id="tema-btn">
                <span>Temas <span>▾</span></span>
            </button>
            <ul id="temas">
                <li>Cornélio Procópio</li>
                <li>Informática</li>
            </ul>
        </div>
        <div class="tabuleiro">
            <div class="grid-jogo"></div>
        </div>
        <div class="timer">
            <span>Tempo</span>
            <div id="timer">
                <span id="minutes">00</span>:<span id="seconds">00</span>
            </div>
        </div>

    </section>
    <div class="overlay-escuro"></div>
    <section class="fim-de-jogo">
        <div>
            <span id="fim-jogador">Parabéns, jogador!</span>
            <span>Tempo: <span id="min-final">00</span>:<span id="seg-final">00</span></span>
            <span>Número de tentativas: <span id="tentativas-final">0</span></span>
            <button class="reiniciar">Reiniciar jogo</button>
        </div>
    </section>


    <button id="theme-toggle">
        <div>
            <img src="../assets/images/icon/sun.svg" alt="modo claro">
            <img src="../assets/images/icon/moon.svg" alt="modo escuro">
        </div>
    </button>
    <div>
        <script src="../scripts/dark-mode.js" ></script>
        <script src="../scripts/perfil.js"></script>
        <script type="module" src="../scripts/jogo.js"></script>
    </div>
</body>
</html>
