<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memora</title>

    <link rel="icon" type="image/x-icon" href="../assets/images/icon/memora-favicon.ico">
    <link rel="stylesheet" href="../styles/global.css">
     <link rel="stylesheet" href="../styles/login.css">
    
</head>
<body>
    <div class="container">
        <div class="card"> 
            
            <img src="../assets/images/logo.svg" alt="Logo Memora" class="logo">
            <p class="subtitulo">CONECTE-SE PARA JOGAR!</p>
        
            <div class="input-group">
                <img src="../assets/images/icon/user.svg" class="icone-campo">
                <input type="text" id="usuario" placeholder="E-mail" class="campo">
            </div>

            <div class="input-group">
                <img src="../assets/images/icon/lock.svg" class="icone-campo">

                <input type="password" id="senha" placeholder="Senha" class="campo">

                    <button id="olho-btn" type="button">
                    <img id="olho-img" src="../assets/images/icon/olhosfechados.svg">
                    </button>
                </div>

            <button class="btn-entrar" id="btn-entrar" type="button">ENTRAR</button>
            <p class="linha-cadastro">Ainda não tem uma conta? <button id="btn-cadastro" type="button">
                Cadastre-se agora!
            </button></p>   
        
        </div>
    </div>


        <div class="modal-overlay" id="modal-cadastro">

            <div class="modal">

                <button class="modal-fechar" id="fechar-cadastro" type="button">X</button>

                <h2>Criar conta</h2>

                <input class="modal-input" id="novo-usuario" type="text" placeholder="Nome de usuário">

                <input class="modal-input" id="novo-email" type="email" placeholder="E-mail">

                <input class="modal-input" id="nova-senha" type="password" placeholder="Senha (min. 6 caracteres)">

                <input class="modal-input" id="confirmar-senha"  type="password" placeholder="Confirmar senha">

                <button class="btn-modal" id="btn-criar" type="button">Criar conta</button>
            
            </div>
        </div>

        
        <button id="theme-toggle">
            <div>
                <img src="../assets/images/icon/sun.svg" alt="modo claro">
                <img src="../assets/images/icon/moon.svg" alt="modo escuro">
            </div>
        </button>

        <div class="mensagem" id="mensagem"></div>


        <script src="../scripts/dark-mode.js" ></script>
        <script type="module" src="../scripts/login.js"></script>

</body>
</html>
