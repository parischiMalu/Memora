<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memora</title>
    <!-- Título exibido na aba do navegador -->
    <link rel="icon" type="image/x-icon" href="../assets/images/icon/memora-favicon.ico">
    <!-- Ícone da aba (favicon) do Memora -->
    <link rel="stylesheet" href="../styles/global.css">
    <!-- Estilos globais: reset, fontes base, variáveis CSS, dark mode, theme-toggle -->
    <link rel="stylesheet" href="../styles/login.css">
    <!-- Estilos específicos desta tela: card, inputs, modais, toast, responsivo -->
</head>

<body>

    <!-- ================================================
         TELA PRINCIPAL DE LOGIN
         ================================================ -->
    <main class="login-container">
    <!-- .login-container: flex centralizado, ocupa 100vh — definido em login.css -->

        <div class="card"> <!-- retângulo branco (ou escuro no Dark Mode) onde ficam os inputs -->
        <!-- .card: caixa branca com sombra, max-width 430px — definido em login.css -->

            <!-- Logo do Memora -->
            <img src="../assets/images/logo.svg" alt="Logo Memora" class="logo">
            <!-- .logo: 240px de largura, margem inferior — definido em login.css -->

            <!-- Subtítulo abaixo do logo -->
            <p class="subtitulo">CONECTE-SE PARA JOGAR!</p>
            <!-- .subtitulo: texto em caps, letter-spacing 2.5px — definido em login.css -->

            <!-- ── Campo: E-mail  
                O type="email" ativa:
                  - Validação nativa do navegador (formato email@dominio.com)
                  - Teclado com @ no mobile
                  - Autocompletar de e-mails salvos no navegador
            -->
            <div class="campo">
            <!-- .campo: wrapper de largura 100%, margem inferior 16px -->

                <label for="usuario"></label>
                <!-- for="usuario" associa o label ao input com id="usuario" (acessibilidade) -->

                <div class="input-wrapper">
                <!-- .input-wrapper: borda verde agua arredondada, com ícone + input -->

                    <img src="../assets/images/icon/user.svg" alt="Usuário" class="icone-campo">
                    <!-- Ícone decorativo à esquerda do input (do usuario)-->

                    <input
                        type="email"
                        id="usuario"
                        autocomplete="email"
                        placeholder=" E-mail"
                    >
                    <!--
                        type="email"      → ativa validação de formato de e-mail no navegador
                        id="usuario"      → mantido igual para compatibilidade com login.js
                        autocomplete="email" → permite que o navegador sugira e-mails salvos
                        placeholder      → dica visual de formato esperado
                    -->
                </div>
            </div>

            <!-- ── Campo: Senha ── -->
            <div class="campo">

                <label for="senha"></label>
                <!-- for="senha" associa o label ao input de senha (acessibilidade) -->

                <div class="input-wrapper">
                    <img src="../assets/images/icon/lock.svg" alt="Senha" class="icone-campo">

                    <input
                        type="password"
                        id="senha"
                        autocomplete="current-password"
                        placeholder=" Senha" 
                    >
                    <button id="olho-btn" type="button" aria-label="Mostrar senha">
                        <img id="olho-img" src="../assets/images/icon/olhosfechados.svg" alt="Mostrar senha">
                    </button> 
                </div>
            </div>
            <!-- permite que o usuário confira se digitou a senha corretamente, type="button" evita comportamento de submit-->


            <!-- ── Link "Esqueceu a senha?" ── -->
            <div class="linha-esqueceu">
            <!-- .linha-esqueceu: text-align right, abre modal ao clicar -->

                <button id="btn-esqueceu" type="button">Esqueceu a senha?</button>
                <!--
                    id="btn-esqueceu" → o login.js escuta clique e chama abrirModal('modal-esqueceu')
                    type="button"     → evita comportamento de submit
                -->
            </div>

            <!-- ── Botão principal: ENTRAR ── -->
            <button class="btn-entrar" id="btn-entrar" type="button">ENTRAR</button>
            <!--
                class="btn-entrar" → estilização rosa com sombra — login.css
                id="btn-entrar"    → o login.js escuta clique e executa o fluxo de autenticação real
                type="button"      → evita submit acidental
            -->

            <!-- ── Link para cadastro ── -->
            <p class="linha-cadastro">
            <!-- .linha-cadastro: texto centralizado, tamanho 13px -->

                Ainda não tem uma conta?
                <button id="btn-cadastro" type="button">Cadastre-se agora!</button>
                <!--
                    id="btn-cadastro" → o login.js escuta clique e chama abrirModal('modal-cadastro')
                    type="button"     → evita comportamento de submit
                -->
            </p>

        </div><!-- fim .card -->
    </main><!-- fim .login-container -->


    <!-- ================================================
         BOTÃO DE ALTERNÂNCIA DE TEMA (CLARO / ESCURO)
         Controlado por dark-mode.js
         ================================================ -->
    <button id="theme-toggle">
    <!-- id="theme-toggle" → referenciado pelo dark-mode.js para alternar body.dark -->
        <div>
            <img src="../assets/images/icon/sun.svg" alt="modo claro">
            <!-- Ícone do sol -->
            <img src="../assets/images/icon/moon.svg" alt="modo escuro">
            <!-- Ícone da lua -->
        </div>
    </button>


    <!-- ================================================
         MODAL: ESQUECEU A SENHA
         Aberto pelo botão #btn-esqueceu
         Fechado pelo botão #fechar-esqueceu ou clique fora
         ================================================ -->
    <div class="modal-overlay" id="modal-esqueceu"> 
        <!--.modal-overlay:  fundo escuro/transparente que cobre o site todo. -->
    
        <div class="modal">
        <button class="modal-fechar" id="fechar-esqueceu" type="button">X</button>
        <!-- É o botão de fechar (o "X") no canto superior do modal -->
        <h2>Redefinir senha</h2>
        <p>Informe seu e-mail e enviaremos as instruções.</p>

        <input
            class="modal-input"
            id="input-esqueceu"
            type="email" 
            placeholder="Seu e-mail cadastrado"
        > <!-- Onde o usuário digita o e-mail; id="input-esqueceu" é o "gancho" que o JavaScript usa para capturar o e-mail 
        e validar se ele existe antes de fingir o envio das instruções.-->

        <button class="btn-modal" id="btn-enviar" type="button">Enviar</button>
    </div>
</div> 
<!-- O botão que confirma a ação, o JS dispara a função mostrarMensagem avisando que o e-mail foi enviado. -->


    <!-- ================================================
         MODAL: CADASTRO
         Aberto pelo botão #btn-cadastro
         Fechado pelo botão #fechar-cadastro ou clique fora
         ================================================ -->
    <div class="modal-overlay" id="modal-cadastro">
    <!--
        id="modal-cadastro" → referenciado pelo login.js para abrir/fechar
        A classe 'aberto' é adicionada/removida pelo login.js
    -->
        <div class="modal">

            <button class="modal-fechar" id="fechar-cadastro" type="button">X</button>
            <!-- id="fechar-cadastro" → login.js escuta e chama fecharModal('modal-cadastro') -->

            <h2>Criar conta</h2>
            <!-- Título do modal de cadastro -->

            <input
                class="modal-input"
                id="novo-usuario"
                type="text"
                placeholder="Nome de usuário"
            >
            <!--
                id="novo-usuario" → login.js lê como "nome" ao chamar cadastrar()
                type="text"       → campo de nome de usuário (string livre)
            -->

            <input
                class="modal-input"
                id="novo-email"
                type="email"
                placeholder="E-mail"
            >
            <!--
                id="novo-email" → login.js lê como "email" ao chamar cadastrar()
                type="email"    → valida formato de e-mail nativamente
            -->

            <input
                class="modal-input"
                id="nova-senha"
                type="password"
                placeholder="Senha (min. 6 caracteres)"
            >
            <!--
                id="nova-senha" → login.js lê como "senha" ao chamar cadastrar()
                type="password" → oculta os caracteres digitados
            -->

            <input
                class="modal-input"
                id="confirmar-senha"
                type="password"
                placeholder="Confirmar senha"
            >
            <!--
                id="confirmar-senha" → login.js compara com nova-senha antes de enviar
                type="password"      → oculta os caracteres digitados
            -->

            <button class="btn-modal" id="btn-criar" type="button">Criar conta</button>
            <!--
                .btn-modal     → botão rosa arredondado — login.css
                id="btn-criar" → login.js escuta clique, valida campos e chama cadastrar() de api.js
                                 Se bem-sucedido: exibe toast, fecha modal e limpa campos
                                 Se erro do backend: exibe mensagem de erro no toast
            -->
        </div>
    </div>


    <!-- ================================================
         TOAST DE FEEDBACK
         Exibido por mostrarMensagem() em login.js
         Aparece na parte inferior da tela por 3 segundos
         ================================================ -->
    <div class="mensagem" id="mensagem"></div>
    <!--
        id="mensagem"    → referenciado por mostrarMensagem() em login.js
        .mensagem        → posição fixed, bottom 28px, centralizado horizontalmente
        .mensagem.visivel → ativa display:block e animação CSS de aparecer
        .mensagem.erro   → muda fundo de teal (#3ecec4) para rosa (#ec4899)
        O texto é definido dinamicamente via el.textContent no login.js
    -->


    <script src="../scripts/dark-mode.js"></script>
    <!--
        Carregado primeiro, sem type="module", para executar imediatamente
        e aplicar body.dark antes de qualquer renderização visível
        (evita flash)
    -->

    <script type="module" src="../scripts/login.js"></script>
    
    <!--
        type="module" permite usar "import" dentro do login.js
        (import { login, cadastrar } from './api.js')
        Sem isso, o navegador lançaria erro de sintaxe ao encontrar "import"
        Módulos são automaticamente adiados (defer) — executam após o DOM estar pronto
    -->

</body>
</html>
